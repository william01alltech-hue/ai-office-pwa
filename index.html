<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="description" content="SyncCore AI 核心智匯是一款新世代 AI 辦公協作套件，支援 Excel 表格、Word 文件、PPT 簡報的線上編輯與地端 AI 算力支援。" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <title>SyncCore AI 核心智匯</title>
    <script>
      window.addEventListener('error', function(e) {
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;z-index:9999;color:red;padding:20px;font-family:monospace;overflow:auto;';
        div.innerHTML = '<h3>Runtime Error</h3><p>' + e.message + '</p><pre>' + (e.error ? e.error.stack : '') + '</pre>';
        (document.body || document.documentElement).appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;z-index:9999;color:red;padding:20px;font-family:monospace;overflow:auto;';
        div.innerHTML = '<h3>Unhandled Promise Rejection</h3><p>' + e.reason + '</p>';
        (document.body || document.documentElement).appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <!-- 靜態骨架屏，用於在 JS 下載完成前，第 0.1 秒立刻呈現網頁佈局，衝刺 FCP 滿分 -->
      <div style="width:100vw; height:100vh; display:flex; flex-direction:column; background-color:#f8fafc; font-family:sans-serif; overflow:hidden;">
        <!-- 模擬 Navbar -->
        <div style="height:56px; background-color:#ffffff; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; justify-content:between; padding:0 24px; box-sizing:border-box;">
          <div style="width:140px; height:20px; background-color:#e2e8f0; border-radius:6px; animation: pulse 1.5s infinite ease-in-out;"></div>
          <div style="display:flex; gap:16px;">
            <div style="width:80px; height:24px; background-color:#e2e8f0; border-radius:6px; animation: pulse 1.5s infinite ease-in-out;"></div>
            <div style="width:80px; height:24px; background-color:#e2e8f0; border-radius:6px; animation: pulse 1.5s infinite ease-in-out;"></div>
          </div>
        </div>
        <!-- 模擬主畫面 -->
        <div style="flex:1; display:flex; flex-direction:column; padding:40px; box-sizing:border-box; gap:32px;">
          <!-- 模擬標題 -->
          <div style="width:200px; height:32px; background-color:#e2e8f0; border-radius:8px; animation: pulse 1.5s infinite ease-in-out;"></div>
          <!-- 模擬卡片區 -->
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:24px;">
            <div style="height:220px; background-color:#ffffff; border:1px solid #e2e8f0; border-radius:24px; animation: pulse 1.5s infinite ease-in-out; box-sizing:border-box; padding:24px; display:flex; flex-direction:column; justify-content:end; gap:12px;">
              <div style="width:40px; height:40px; background-color:#e2e8f0; border-radius:50%;"></div>
              <div style="width:80%; height:20px; background-color:#e2e8f0; border-radius:4px;"></div>
            </div>
            <div style="height:220px; background-color:#ffffff; border:1px solid #e2e8f0; border-radius:24px; animation: pulse 1.5s infinite ease-in-out; box-sizing:border-box; padding:24px; display:flex; flex-direction:column; justify-content:end; gap:12px;">
              <div style="width:40px; height:40px; background-color:#e2e8f0; border-radius:50%;"></div>
              <div style="width:80%; height:20px; background-color:#e2e8f0; border-radius:4px;"></div>
            </div>
            <div style="height:220px; background-color:#ffffff; border:1px solid #e2e8f0; border-radius:24px; animation: pulse 1.5s infinite ease-in-out; box-sizing:border-box; padding:24px; display:flex; flex-direction:column; justify-content:end; gap:12px;">
              <div style="width:40px; height:40px; background-color:#e2e8f0; border-radius:50%;"></div>
              <div style="width:80%; height:20px; background-color:#e2e8f0; border-radius:4px;"></div>
            </div>
          </div>
        </div>
      </div>
      <style>
        @keyframes pulse {
          0% { opacity: 0.6; }
          50% { opacity: 1; }
          100% { opacity: 0.6; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
