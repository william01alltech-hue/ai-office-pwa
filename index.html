<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <title>SyncCore AI 核心智匯</title>
    <script>
      window.addEventListener('error', function(e) {
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;z-index:9999;color:red;padding:20px;font-family:monospace;overflow:auto;';
        div.innerHTML = '<h3>Runtime Error</h3><p>' + e.message + '</p><pre>' + (e.error ? e.error.stack : '') + '</pre>';
        (document.body || document.documentElement).appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;z-index:9999;color:red;padding:20px;font-family:monospace;overflow:auto;';
        div.innerHTML = '<h3>Unhandled Promise Rejection</h3><p>' + e.reason + '</p>';
        (document.body || document.documentElement).appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
